<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" style="background-color: white;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#22242a"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #22242a; stroke-width: 1.5px; rx: 6px; }
      .box-dashed { fill: #ffffff; stroke: #22242a; stroke-width: 1.5px; stroke-dasharray: 4,4; rx: 6px; }
      .lane { fill: #f8f9fa; stroke: #22242a; stroke-width: 1.5px; }
      .lane-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #22242a; }
      .text-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #22242a; }
      .text-main { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #22242a; }
      .text-sub { font-family: Arial, sans-serif; font-size: 11px; fill: #555555; }
      .line { stroke: #22242a; stroke-width: 1.5px; fill: none; }
      .line-dashed { stroke: #22242a; stroke-width: 1.5px; stroke-dasharray: 4,4; fill: none; }
      .wall { stroke: #d9534f; stroke-width: 2px; stroke-dasharray: 6,4; fill: none; }
      .wall-label { font-family: Arial, sans-serif; font-size: 10px; font-weight: bold; fill: #d9534f; }
    </style>
  </defs>

  <text x="400" y="40" class="text-title" text-anchor="middle">Workflow de Avaliação de Desempenho - Arquitetura de Dados</text>

  <!-- Zone 1: Inputs Isolados -->
  <rect x="20" y="80" width="220" height="380" class="lane" />
  <rect x="20" y="80" width="220" height="30" class="box" style="fill:#e9ecef; stroke-width:1.5px; rx:0;" />
  <text x="130" y="100" class="lane-title" text-anchor="middle">1. Inputs (Microsoft Forms)</text>

  <rect x="40" y="140" width="180" height="50" class="box" />
  <text x="130" y="160" class="text-main" text-anchor="middle">Autoavaliação</text>
  <text x="130" y="176" class="text-sub" text-anchor="middle">Colaboradores e Supervisores</text>

  <rect x="40" y="240" width="180" height="50" class="box" />
  <text x="130" y="260" class="text-main" text-anchor="middle">Avaliação Operacional</text>
  <text x="130" y="276" class="text-sub" text-anchor="middle">Responsáveis Directos</text>

  <rect x="40" y="340" width="180" height="50" class="box" />
  <text x="130" y="360" class="text-main" text-anchor="middle">Avaliação de Direcção</text>
  <text x="130" y="376" class="text-sub" text-anchor="middle">Director Geral</text>

  <!-- Flow Arrows to PA -->
  <path d="M 220 165 L 300 210" class="line" marker-end="url(#arrow)" />
  <path d="M 220 265 L 300 265" class="line" marker-end="url(#arrow)" />
  <path d="M 220 365 L 300 320" class="line" marker-end="url(#arrow)" />

  <!-- Zone 2: Power Automate -->
  <rect x="300" y="180" width="200" height="170" class="lane" style="rx:8;" />
  <rect x="300" y="180" width="200" height="30" class="box" style="fill:#e9ecef; stroke-width:1.5px; rx:8 8 0 0;" />
  <text x="400" y="200" class="lane-title" text-anchor="middle">2. Motor (Power Automate)</text>
  
  <rect x="320" y="230" width="160" height="25" class="box" />
  <text x="400" y="247" class="text-sub" text-anchor="middle">Captura de Submissão</text>

  <rect x="320" y="265" width="160" height="25" class="box" />
  <text x="400" y="282" class="text-sub" text-anchor="middle">Normalização de Dados</text>

  <rect x="320" y="300" width="160" height="25" class="box" />
  <text x="400" y="317" class="text-sub" text-anchor="middle">Orquestração de Notificações</text>

  <!-- Flow to SharePoint -->
  <path d="M 500 265 L 560 265" class="line" marker-end="url(#arrow)" />
  <text x="530" y="255" class="text-sub" text-anchor="middle">POST</text>

  <!-- Security Wall -->
  <path d="M 270 80 L 270 460" class="wall" />
  <rect x="250" y="420" width="40" height="15" style="fill:white;" />
  <text x="270" y="432" class="wall-label" text-anchor="middle">BARREIRA</text>

  <!-- Zone 3: SharePoint List -->
  <rect x="560" y="180" width="200" height="110" class="lane" style="rx:8;" />
  <rect x="560" y="180" width="200" height="30" class="box" style="fill:#e9ecef; stroke-width:1.5px; rx:8 8 0 0;" />
  <text x="660" y="200" class="lane-title" text-anchor="middle">3. Base Central (SharePoint)</text>

  <text x="660" y="240" class="text-sub" text-anchor="middle">Registo Único por Colaborador</text>
  <text x="660" y="260" class="text-sub" text-anchor="middle">Consolidação Automática</text>
  <text x="660" y="280" class="text-sub" text-anchor="middle">Isolamento de Segurança</text>

  <!-- Flow to RH -->
  <path d="M 660 290 L 660 340" class="line" marker-end="url(#arrow)" />
  <text x="670" y="325" class="text-sub" text-anchor="start">Leitura/Escrita</text>

  <!-- Zone 4: RH -->
  <rect x="560" y="340" width="200" height="100" class="lane" style="rx:8;" />
  <rect x="560" y="340" width="200" height="30" class="box" style="fill:#e9ecef; stroke-width:1.5px; rx:8 8 0 0;" />
  <text x="660" y="360" class="lane-title" text-anchor="middle">4. Auditoria (RH)</text>

  <text x="660" y="390" class="text-sub" text-anchor="middle">Acesso Total aos Dados</text>
  <text x="660" y="410" class="text-sub" text-anchor="middle">Emissão de Parecer Final</text>
  <text x="660" y="430" class="text-sub" text-anchor="middle">Geração de Relatórios</text>

</svg>
