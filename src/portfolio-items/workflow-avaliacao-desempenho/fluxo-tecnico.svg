<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%" style="background-color: white;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#22242a"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #22242a; stroke-width: 1.5px; rx: 6px; }
      .box-dashed { fill: #ffffff; stroke: #22242a; stroke-width: 1.5px; stroke-dasharray: 4,4; rx: 6px; }
      .lane { fill: #f8f9fa; stroke: #22242a; stroke-width: 1.5px; }
      .lane-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #22242a; }
      .text-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #22242a; }
      .text-main { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #22242a; }
      .text-sub { font-family: Arial, sans-serif; font-size: 11px; fill: #555555; }
      .line { stroke: #22242a; stroke-width: 1.5px; fill: none; }
      .line-dashed { stroke: #22242a; stroke-width: 1.5px; stroke-dasharray: 4,4; fill: none; }
    </style>
  </defs>

  <text x="400" y="40" class="text-title" text-anchor="middle">Workflow de Avaliação de Desempenho - Fluxo Técnico</text>

  <!-- Lane: Nível 1 -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="340" height="480" class="lane" />
    <rect x="0" y="0" width="340" height="30" class="box" style="fill:#e9ecef; stroke-width:1.5px; rx:0;" />
    <text x="170" y="20" class="lane-title" text-anchor="middle">Nível 1 - Colaboradores Operacionais</text>

    <!-- Node 1 -->
    <rect x="70" y="60" width="200" height="50" class="box" />
    <text x="170" y="80" class="text-main" text-anchor="middle">Recursos Humanos</text>
    <text x="170" y="96" class="text-sub" text-anchor="middle">Disponibiliza Autoavaliação</text>

    <path d="M 170 110 L 170 140" class="line" marker-end="url(#arrow)" />

    <!-- Node 2 -->
    <rect x="70" y="140" width="200" height="50" class="box" />
    <text x="170" y="160" class="text-main" text-anchor="middle">Colaborador</text>
    <text x="170" y="176" class="text-sub" text-anchor="middle">Submete Autoavaliação</text>

    <path d="M 170 190 L 170 220" class="line" marker-end="url(#arrow)" />

    <!-- Node 3 -->
    <rect x="70" y="220" width="200" height="60" class="box-dashed" />
    <text x="170" y="240" class="text-main" text-anchor="middle">Power Automate</text>
    <text x="170" y="256" class="text-sub" text-anchor="middle">Processa e Notifica</text>
    <text x="170" y="270" class="text-sub" text-anchor="middle">Avaliador e RH</text>

    <path d="M 170 280 L 170 320" class="line" marker-end="url(#arrow)" />

    <!-- Node 4 -->
    <rect x="70" y="320" width="200" height="50" class="box" />
    <text x="170" y="340" class="text-main" text-anchor="middle">Responsável Directo</text>
    <text x="170" y="356" class="text-sub" text-anchor="middle">Realiza Avaliação</text>

    <path d="M 170 370 L 170 400" class="line" marker-end="url(#arrow)" />

    <!-- Node 5 -->
    <rect x="70" y="400" width="200" height="50" class="box" />
    <text x="170" y="420" class="text-main" text-anchor="middle">Recursos Humanos</text>
    <text x="170" y="436" class="text-sub" text-anchor="middle">Emite Parecer Final</text>
  </g>

  <!-- Lane: Nível 2 -->
  <g transform="translate(420, 80)">
    <rect x="0" y="0" width="340" height="480" class="lane" />
    <rect x="0" y="0" width="340" height="30" class="box" style="fill:#e9ecef; stroke-width:1.5px; rx:0;" />
    <text x="170" y="20" class="lane-title" text-anchor="middle">Nível 2 - Colaboradores Supervisores</text>

    <!-- Node 1 -->
    <rect x="70" y="60" width="200" height="50" class="box" />
    <text x="170" y="80" class="text-main" text-anchor="middle">Recursos Humanos</text>
    <text x="170" y="96" class="text-sub" text-anchor="middle">Disponibiliza Autoavaliação</text>

    <path d="M 170 110 L 170 140" class="line" marker-end="url(#arrow)" />

    <!-- Node 2 -->
    <rect x="70" y="140" width="200" height="50" class="box" />
    <text x="170" y="160" class="text-main" text-anchor="middle">Supervisor</text>
    <text x="170" y="176" class="text-sub" text-anchor="middle">Submete Autoavaliação</text>

    <path d="M 170 190 L 170 220" class="line" marker-end="url(#arrow)" />

    <!-- Node 3 -->
    <rect x="70" y="220" width="200" height="60" class="box-dashed" />
    <text x="170" y="240" class="text-main" text-anchor="middle">Power Automate</text>
    <text x="170" y="256" class="text-sub" text-anchor="middle">Processa e Notifica</text>
    <text x="170" y="270" class="text-sub" text-anchor="middle">Director Geral</text>

    <path d="M 170 280 L 170 320" class="line" marker-end="url(#arrow)" />

    <!-- Node 4 -->
    <rect x="70" y="320" width="200" height="50" class="box" />
    <text x="170" y="340" class="text-main" text-anchor="middle">Director Geral</text>
    <text x="170" y="356" class="text-sub" text-anchor="middle">Realiza Avaliação</text>

    <path d="M 170 370 L 170 400" class="line" marker-end="url(#arrow)" />

    <!-- Node 5 -->
    <rect x="70" y="400" width="200" height="50" class="box" />
    <text x="170" y="420" class="text-main" text-anchor="middle">Recursos Humanos</text>
    <text x="170" y="436" class="text-sub" text-anchor="middle">Emite Parecer Final</text>
  </g>

</svg>
